<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meteo Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }

    canvas {
      margin-top: 20px;
      max-width: 900px;
      background: #111827;
      border-radius: 10px;
      padding: 10px;
    }

    #out {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🌦 Meteo Dashboard</h1>

<button onclick="current()">Current</button>
<button onclick="last24()">24h</button>
<button onclick="forecast()">7 days</button>

<pre id="out">Click a button...</pre>

<canvas id="chart"></canvas>

<script>
const lat = 49.84;
const lon = 24.03;

let chart = null;

async function current() {
  const r = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`
  );
  const d = await r.json();

  document.getElementById("out").textContent =
    "🌡 Current temperature: " + d.current.temperature_2m + "°C";
}

async function last24() {
  const r = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&past_days=1`
  );
  const d = await r.json();

  const temps = d.hourly.temperature_2m.slice(-24);
  const times = d.hourly.time.slice(-24).map(t => t.slice(11, 16));

  drawChart(times, temps, "Temperature (24h)");

  document.getElementById("out").textContent =
    "📊 24h chart loaded";
}

async function forecast() {
  const r = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&forecast_days=7`
  );
  const d = await r.json();

  const days = d.daily.time;
  const max = d.daily.temperature_2m_max;

  drawChart(days, max, "Max Temperature (7 days)");

  document.getElementById("out").textContent =
    "📅 7-day chart loaded";
}

function drawChart(labels, values, title) {
  const ctx = document.getElementById("chart").getContext("2d");

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: title,
        data: values,
        borderColor: "cyan",
        backgroundColor: "rgba(0,255,255,0.1)",
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      },
      scales: {
        x: {
          ticks: { color: "white" }
        },
        y: {
          ticks: { color: "white" }
        }
      }
    }
  });
}
</script>

</body>
</html>

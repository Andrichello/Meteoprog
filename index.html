<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meteo Dashboard</title>

  <!-- FIXED Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    canvas {
      margin-top: 20px;
      max-width: 900px;
      background: #111827;
      border-radius: 10px;
      padding: 10px;
    }

    #out {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1>🌦 Meteo Dashboard</h1>

<button onclick="current()">Current</button>
<button onclick="last24()">24h</button>
<button onclick="forecast()">7 days</button>

<pre id="out">Loading...</pre>

<canvas id="chart"></canvas>

<script>
const lat = 49.84;
const lon = 24.03;

let chart = null;

// ---- CURRENT ----
async function current() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`);
  const d = await r.json();

  document.getElementById("out").textContent =
    "🌡 Current: " + d.current.temperature_2m + "°C";
}

// ---- 24H ----
async function last24() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&past_days=1`);
  const d = await r.json();

  const temps = d.hourly.temperature_2m.slice(-24);
  const times = d.hourly.time.slice(-24).map(t => t.slice(11,16));

  drawChart(times, temps, "Temperature 24h");
}

// ---- 7 DAY ----
async function forecast() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max&forecast_days=7`);
  const d = await r.json();

  drawChart(d.daily.time, d.daily.temperature_2m_max, "7 Day Max Temp");
}

// ---- CHART ----
function drawChart(labels, values, title) {
  const canvas = document.getElementById("chart");

  if (!canvas) {
    alert("Canvas not found!");
    return;
  }

  const ctx = canvas.getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: title,
        data: values,
        borderColor: "#00ffff",
        backgroundColor: "rgba(0,255,255,0.1)",
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      },
      scales: {
        x: { ticks: { color: "white" } },
        y: { ticks: { color: "white" } }
      }
    }
  });

  document.getElementById("out").textContent = "📊 Chart loaded: " + title;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Weather Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    #map {
      height: 90vh;
      width: 100%;
    }

    .panel {
      padding: 10px;
      text-align: center;
      background: #111827;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="panel">
  <button onclick="setModel('gfs')">GFS</button>
  <button onclick="setModel('ecmwf')">ECMWF</button>
</div>

<div id="map"></div>

<script>
const lat = 49.84;
const lon = 24.03;

let map = L.map('map').setView([lat, lon], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OSM'
}).addTo(map);

let tempLayer;

// 🌡 добавить слой температуры
function addTempLayer(model) {

  if (tempLayer) {
    map.removeLayer(tempLayer);
  }

  // Open-Meteo tile layer
  const url =
    model === 'gfs'
      ? "https://tile.open-meteo.com/v1/temperature/{z}/{x}/{y}.png?model=gfs"
      : "https://tile.open-meteo.com/v1/temperature/{z}/{x}/{y}.png?model=ecmwf";

  tempLayer = L.tileLayer(url, {
    opacity: 0.6
  }).addTo(map);
}

// переключение моделей
function setModel(model) {
  addTempLayer(model);
}

// старт
setModel('gfs');
</script>

</body>
</html>
